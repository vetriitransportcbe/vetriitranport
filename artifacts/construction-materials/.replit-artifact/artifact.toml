kind = "web"
previewPath = "/"
title = "Construction Materials Website"
version = "1.0.0"
id = "artifacts/construction-materials"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18500

[services.development]
run = "pnpm --filter @workspace/construction-materials run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/construction-materials", "run", "build" ]
publicDir = "artifacts/construction-materials/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18500"
BASE_PATH = "/"
